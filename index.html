<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智能庫存即時看板 (輕量穩定版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">🦊 智能庫存動態即時看板 (已優化穩定連線)</h1>
        
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <div class="flex gap-4">
                <button onclick="addStockRow()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg">➕ 新增標的</button>
                <button onclick="fetchAllPrices()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">🔄 強制刷新所有股價</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-4">股票代號</th>
                        <th class="p-4">股數</th>
                        <th class="p-4">成本</th>
                        <th class="p-4">當下股價</th>
                        <th class="p-4">損益幅</th>
                        <th class="p-4">操作</th>
                    </tr>
                </thead>
                <tbody id="stockTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let stocks = JSON.parse(localStorage.getItem('stocks')) || [{name: '2330', shares: 100, cost: 300, current: 0}];

        async function fetchPrice(name) {
            try {
                // 使用公開介面查詢
                const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${name}.TW?interval=1d&range=1d`);
                const data = await res.json();
                return data.chart.result[0].meta.regularMarketPrice;
            } catch (e) {
                return null;
            }
        }

        async function fetchAllPrices() {
            for (let s of stocks) {
                if (/^\d+$/.test(s.name)) {
                    let price = await fetchPrice(s.name);
                    if (price) s.current = price;
                }
            }
            render();
            localStorage.setItem('stocks', JSON.stringify(stocks));
        }

        function render() {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';
            stocks.forEach((s, i) => {
                const row = document.createElement('tr');
                const diff = s.current > 0 ? (((s.current - s.cost) / s.cost) * 100).toFixed(2) + '%' : '-';
                row.innerHTML = `
                    <td class="p-4"><input type="text" value="${s.name}" onchange="update(${i}, 'name', this.value)" class="border p-1 w-20"></td>
                    <td class="p-4"><input type="number" value="${s.shares}" onchange="update(${i}, 'shares', this.value)" class="border p-1 w-20"></td>
                    <td class="p-4"><input type="number" value="${s.cost}" onchange="update(${i}, 'cost', this.value)" class="border p-1 w-20"></td>
                    <td class="p-4">${s.current || '等待更新...'}</td>
                    <td class="p-4 font-bold ${parseFloat(diff) >= 0 ? 'text-red-500' : 'text-green-500'}">${diff}</td>
                    <td class="p-4"><button onclick="del(${i})" class="text-red-500">刪除</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function update(i, field, val) { stocks[i][field] = val; localStorage.setItem('stocks', JSON.stringify(stocks)); }
        function addStockRow() { stocks.push({name: '', shares: 0, cost: 0, current: 0}); render(); }
        function del(i) { stocks.splice(i, 1); render(); localStorage.setItem('stocks', JSON.stringify(stocks)); }
        
        render();
    </script>
</body>
</html>
