<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>個人智能庫存紀錄表</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">🦊 智能庫存動態紀錄表</h1>
        
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <div class="grid grid-cols-4 gap-4 mb-4">
                <div class="p-4 bg-gray-50 rounded">本金總額: <span id="totalCapital">0</span></div>
                <div class="p-4 bg-gray-50 rounded">目前總市值: <span id="totalValue">0</span></div>
                <div class="p-4 bg-gray-50 rounded">總損益: <span id="totalProfit">0</span></div>
            </div>
            <div class="flex gap-4">
                <button onclick="addStockRow()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg">➕ 新增標的</button>
                <button onclick="saveData()" class="bg-purple-600 text-white px-6 py-2 rounded-lg">💾 手動存檔</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-4">股票代號</th>
                        <th class="p-4">股數</th>
                        <th class="p-4">成本</th>
                        <th class="p-4">當下股價</th>
                        <th class="p-4">庫存損益</th>
                        <th class="p-4">操作</th>
                    </tr>
                </thead>
                <tbody id="stockTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let stocks = JSON.parse(localStorage.getItem('my_stocks')) || [];

        function render() {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';
            let totalCap = 0, totalVal = 0;

            stocks.forEach((s, i) => {
                const row = document.createElement('tr');
                const marketVal = s.shares * s.current;
                const costVal = s.shares * s.cost;
                totalCap += costVal;
                totalVal += marketVal;

                const profit = s.current > 0 ? (marketVal - costVal).toFixed(0) : '-';
                
                row.innerHTML = `
                    <td class="p-4"><input type="text" value="${s.name}" onchange="stocks[${i}].name=this.value" class="border p-1 w-20"></td>
                    <td class="p-4"><input type="number" value="${s.shares}" onchange="stocks[${i}].shares=Number(this.value);render()" class="border p-1 w-20"></td>
                    <td class="p-4"><input type="number" value="${s.cost}" onchange="stocks[${i}].cost=Number(this.value);render()" class="border p-1 w-20"></td>
                    <td class="p-4"><input type="number" value="${s.current}" onchange="stocks[${i}].current=Number(this.value);render()" class="border p-1 w-20"></td>
                    <td class="p-4 font-bold ${profit >= 0 ? 'text-red-500' : 'text-green-500'}">${profit}</td>
                    <td class="p-4"><button onclick="del(${i})" class="text-red-500">刪除</button></td>
                `;
                tbody.appendChild(row);
            });
            document.getElementById('totalCapital').innerText = totalCap;
            document.getElementById('totalValue').innerText = totalVal;
            document.getElementById('totalProfit').innerText = (totalVal - totalCap).toFixed(0);
        }

        function addStockRow() { stocks.push({name: '', shares: 0, cost: 0, current: 0}); render(); }
        function del(i) { stocks.splice(i, 1); render(); }
        function saveData() { localStorage.setItem('my_stocks', JSON.stringify(stocks)); alert('已儲存！'); }
        
        render();
    </script>
</body>
</html>
