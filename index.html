<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智能庫存動態即時看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto text-slate-800">
        <div class="flex flex-col items-center mb-6">
            <div class="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-md text-2xl mb-2">📊</div>
            <h1 class="text-2xl font-bold text-slate-800">智能庫存動態即時看板</h1>
        </div>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <label class="block text-xs font-medium text-slate-500 mb-1">投入總本金 (元) <span class="text-gray-400 text-[10px]">(依庫存自動計算)</span></label>
                    <span id="totalCapital" class="text-xl font-bold text-slate-700">0</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <label class="block text-xs font-medium text-slate-500 mb-1">目前總現值 (元) <span class="text-gray-400 text-[10px]">(個股市值加總)</span></label>
                    <span id="totalValue" class="text-xl font-bold text-slate-700">0</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <label class="block text-xs font-medium text-slate-500 mb-1">庫存總損益金額 (元)</label>
                    <span id="totalProfit" class="text-xl font-bold text-slate-700">0</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <label class="block text-xs font-medium text-slate-500 mb-1">總損益百分比 (%)</label>
                    <span id="totalPercent" class="text-xl font-bold text-slate-700">0.00%</span>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-4 items-center">
                <button onclick="addStockRow()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl font-bold transition flex items-center gap-1 shadow-sm">
                    <span>＋</span> 新增股票
                </button>
                <button onclick="saveData()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2.5 rounded-xl font-bold transition flex items-center gap-1 shadow-sm">
                    <span>💾</span> 手動即時存檔
                </button>
                <span id="sysStatus" class="text-xs text-slate-400 flex items-center gap-1 ml-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 系統準備就緒
                </span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-white text-sm font-medium">
                        <tr>
                            <th class="p-4 pl-6">代號/名稱</th>
                            <th class="p-4">持股股數</th>
                            <th class="p-4">平均成本 (元)</th>
                            <th class="p-4">當下股價 (元)</th>
                            <th class="p-4">庫存漲跌幅</th>
                            <th class="p-4">目前市值</th>
                            <th class="p-4">本金占比</th>
                            <th class="p-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody" class="text-sm divide-y divide-slate-100 font-medium">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <h2 class="text-base font-bold text-slate-700 mb-4 flex items-center gap-1">🔍 歷史明細篩選控制區</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">交易標的篩選</label>
                    <select id="filterName" onchange="renderHistory()" class="w-full border border-slate-200 rounded-xl p-2 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500">
                        <option value="all">顯示全部標的</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">開始日期</label>
                    <input type="date" id="filterStart" onchange="renderHistory()" class="w-full border border-slate-200 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-slate-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">結束日期</label>
                    <input type="date" id="filterEnd" onchange="renderHistory()" class="w-full border border-slate-200 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-slate-500">
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-12">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-base font-bold text-slate-700 flex items-center gap-1">📜 歷史交易紀錄與實現損益明細</h2>
                <button onclick="clearHistory()" class="bg-slate-100 hover:bg-slate-200 text-slate-500 text-xs px-3 py-1.5 rounded-lg font-bold transition">🗑️ 清空歷史紀錄</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 text-slate-600 text-xs font-bold uppercase tracking-wider">
                        <tr>
                            <th class="p-3 pl-4">交易日期</th>
                            <th class="p-3">股票標的</th>
                            <th class="p-3">交易類型</th>
                            <th class="p-3">異動股數</th>
                            <th class="p-3">交易單價</th>
                            <th class="p-3">交易總額</th>
                            <th class="p-3 pr-4">該筆實現損益</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody" class="text-sm divide-y divide-slate-100 font-medium text-slate-600">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let stocks = JSON.parse(localStorage.getItem('my_stocks')) || [];
        let history = JSON.parse(localStorage.getItem('my_history')) || [];

        // 核心渲染畫面邏輯
        function render() {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';
            let tCap = 0, tVal = 0;

            if (stocks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-8 text-center text-slate-400 bg-slate-50 rounded-b-2xl">目前無庫存資料，請點擊上方「＋ 新增股票」並輸入台股代號開始。</td></tr>`;
            } else {
                stocks.forEach(s => {
                    tCap += s.shares * s.cost;
                    tVal += s.shares * s.current;
                });

                stocks.forEach((s, i) => {
                    const row = document.createElement('tr');
                    const marketVal = s.shares * s.current;
                    const costVal = s.shares * s.cost;
                    const diffRatio = s.cost > 0 ? ((s.current - s.cost) / s.cost * 100).toFixed(2) : '0.00';
                    const capWeight = tCap > 0 ? ((cVal / tCap) * 100).toFixed(2) + '%' : '0.00%';
                    
                    const isProfit = s.current >= s.cost;
                    const colorClass = isProfit ? 'text-red-600' : 'text-emerald-600';
                    const sign = isProfit ? '+' : '';

                    row.innerHTML = `
                        <td class="p-4">
                            <input type="text" value="${s.name}" placeholder="請輸入代號 (如: 2330)" 
                                onchange="handleStockCodeChange(${i}, this.value)" 
                                class="border border-slate-200 p-1.5 rounded-xl w-48 bg-white text-blue-600 font-semibold focus:outline-none focus:ring-1 focus:ring-blue-400">
                        </td>
                        <td class="p-4"><input type="number" value="${s.shares}" onchange="stocks[${i}].shares=Number(this.value);render()" class="border border-slate-200 p-1.5 rounded-xl w-24 text-slate-700 focus:outline-none focus:ring-1 focus:ring-slate-400"></td>
                        <td class="p-4"><input type="number" value="${s.cost}" onchange="stocks[${i}].cost=Number(this.value);render()" class="border border-slate-200 p-1.5 rounded-xl w-24 text-slate-700 focus:outline-none focus:ring-1 focus:ring-slate-400"></td>
                        <td class="p-4"><input type="number" value="${s.current}" readonly class="border border-slate-100 p-1.5 rounded-xl w-24 text-slate-600 bg-gray-100 cursor-not-allowed font-semibold focus:outline-none"></td>
                        <td class="p-4 font-bold ${colorClass}">${sign}${diffRatio}%</td>
                        <td class="p-4 text-slate-600">$${Math.round(marketVal).toLocaleString()}</td>
                        <td class="p-4 text-slate-500">${capWeight}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-2">
                                <button onclick="triggerTransaction(${i})" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-2.5 py-1 rounded-lg text-xs font-bold transition">🔄 交易異動</button>
                                <button onclick="delRow(${i})" class="bg-red-50 text-red-500 hover:bg-red-100 px-2.5 py-1 rounded-lg text-xs font-bold transition">🗑️ 刪除</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            const profitVal = tVal - tCap;
            const totalPercent = tCap > 0 ? ((profitVal / tCap) * 100).toFixed(2) : '0.00';
            
            document.getElementById('totalCapital').innerText = Math.round(tCap).toLocaleString();
            document.getElementById('totalValue').innerText = Math.round(tVal).toLocaleString();
            
            const pBox = document.getElementById('totalProfit');
            pBox.innerText = (profitVal >= 0 ? '+' : '') + Math.round(profitVal).toLocaleString();
            pBox.className = `text-xl font-bold ${profitVal >= 0 ? 'text-red-600' : 'text-emerald-600'}`;

            const pctBox = document.getElementById('totalPercent');
            pctBox.innerText = (profitVal >= 0 ? '+' : '') + totalPercent + '%';
            pctBox.className = `text-xl font-bold ${profitVal >= 0 ? 'text-red-600' : 'text-emerald-600'}`;

            renderHistory();
        }

        // 核心邏輯：當代號改變時，自動去網路抓取名稱與股價
        async function handleStockCodeChange(index, value) {
            const updateStatus = (msg) => document.getElementById('sysStatus').innerText = msg;
            // 提取出純數字代號
            const codeMatch = value.match(/\d+/);
            if (!codeMatch) {
                alert('請輸入正確的股票純數字代號！');
                return;
            }
            const code = codeMatch[0];
            updateStatus(`🔍 正在查詢代號 ${code} ...`);

            try {
                // 向 Yahoo Finance 發出 API 請求
                const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${code}.TW?interval=1d&range=1d`);
                const data = await res.json();
                
                // 讀取名稱與最新價格（若為假日，API會回傳前一交易日收盤價）
                const meta = data.chart.result[0].meta;
                const price = meta.regularMarketPrice;
                
                // 嘗試從 API 取出公司簡稱，若無則用代號替代
                let shortName = meta.symbol.replace('.TW', '');
                
                if (price && price > 0) {
                    stocks[index].name = `${code} ${shortName}`;
                    stocks[index].current = price;
                    updateStatus(`✅ 成功載入: ${code} ${shortName}`);
                } else {
                    throw new Error('查無股價');
                }
            } catch (e) {
                updateStatus(`❌ 查詢代號 ${code} 失敗，請確認代號是否正確或網路是否遭阻擋`);
                alert(`無法自動獲取代號 ${code} 的資料，請確認是否為正確的台股上市公司代號。`);
                stocks[index].name = code; // 失敗時保留原輸入
            }
            
            render();
            updateFilterOptions();
        }

        function addStockRow() { 
            stocks.push({name: '', shares: 0, cost: 0, current: 0}); 
            render(); 
            updateFilterOptions();
        }
        function delRow(i) { if(confirm('確定要刪除此庫存標的？')) { stocks.splice(i, 1); render(); updateFilterOptions(); } }

        function triggerTransaction(i) {
            if(!stocks[i].name) { alert('請先輸入股票代號並等系統自動確認後，再進行交易異動！'); return; }
            const type = prompt("請輸入交易異動類型 (買入 / 賣出):", "買入");
            if(!type || (type !== '買入' && type !== '賣出')) return;
            const num = Number(prompt("請輸入異動股數:", "1000"));
            if(!num || num <= 0) return;
            const price = Number(prompt("請輸入交易單價:", stocks[i].current));
            if(!price || price <= 0) return;

            const today = new Date().toISOString().split('T')[0];
            const totalAmount = num * price;
            let realProfit = 0;

            if(type === '賣出') {
                realProfit = (price - stocks[i].cost) * num;
                stocks[i].shares -= num;
            } else {
                const totalCost = (stocks[i].shares * stocks[i].cost) + totalAmount;
                stocks[i].shares += num;
                stocks[i].cost = Number((totalCost / stocks[i].shares).toFixed(2));
            }

            history.unshift({
                date: today,
                name: stocks[i].name,
                type: type,
                shares: num,
                price: price,
                total: totalAmount,
                profit: realProfit
            });

            if(stocks[i].shares <= 0) stocks.splice(i, 1);

            render();
            localStorage.setItem('my_stocks', JSON.stringify(stocks));
            localStorage.setItem('my_history', JSON.stringify(history));
        }

        function renderHistory() {
            const fName = document.getElementById('filterName').value;
            const fStart = document.getElementById('filterStart').value;
            const fEnd = document.getElementById('filterEnd').value;
            const hbody = document.getElementById('historyTableBody');
            hbody.innerHTML = '';

            let filtered = history.filter(h => {
                if (fName !== 'all' && h.name !== fName) return false;
                if (fStart && h.date < fStart) return false;
                if (fEnd && h.date > fEnd) return false;
                return true;
            });

            if(filtered.length === 0) {
                hbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-slate-400 bg-slate-50">查無對應歷史篩選明細項目</td></tr>`;
                return;
            }

            hbody.innerHTML = filtered.map(h => {
                const profitColor = h.profit >= 0 ? 'text-red-500' : 'text-emerald-500';
                const profitText = h.type === '賣出' ? `$${Math.round(h.profit).toLocaleString()}` : '--';
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-3 pl-4 text-slate-500">${h.date}</td>
                        <td class="p-3 font-semibold text-slate-700">${h.name}</td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded text-xs ${h.type==='買入'?'bg-red-50 text-red-600':'bg-emerald-50 text-emerald-600'}">${h.type}</span></td>
                        <td class="p-3">${h.shares.toLocaleString()}</td>
                        <td class="p-3">$${h.price}</td>
                        <td class="p-3">$${Math.round(h.total).toLocaleString()}</td>
                        <td class="p-3 pr-4 font-bold ${profitColor}">${profitText}</td>
                    </tr>
                `;
            }).join('');
        }

        function updateFilterOptions() {
            const select = document.getElementById('filterName');
            const savedValue = select.value;
            select.innerHTML = '<option value="all">顯示全部標的</option>';
            
            const uniqueNames = [...new Set(stocks.map(s => s.name).concat(history.map(h => h.name)))];
            uniqueNames.forEach(name => {
                if(!name) return;
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            });
            select.value = uniqueNames.includes(savedValue) ? savedValue : 'all';
        }

        function clearHistory() { if(confirm('⚠️ 確定要徹底刪除所有交易歷史歷史流水帳本？')) { history = []; localStorage.setItem('my_history', JSON.stringify(history)); renderHistory(); } }
        function saveData() { localStorage.setItem('my_stocks', JSON.stringify(stocks)); localStorage.setItem('my_history', JSON.stringify(history)); alert('💾 本地數據與流水帳本已成功手動同步存檔至本機瀏覽器！'); }

        // 背景靜態更新機制：開啟網頁時默默把現有庫存的價格刷新一次
        async function fetchPriceBackground() {
            for (let s of stocks) {
                const codeMatch = s.name.match(/\d+/);
                if (codeMatch) {
                    try {
                        const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${codeMatch[0]}.TW?interval=1d&range=1d`);
                        const data = await res.json();
                        const price = data.chart.result[0].meta.regularMarketPrice;
                        if (price && price > 0) s.current = price;
                    } catch (e) {}
                }
            }
            render();
        }

        updateFilterOptions();
        render();
        // 進入網頁 1.5 秒後背景靜態刷新一次
        setTimeout(fetchPriceBackground, 1500);
    </script>
</body>
</html>
