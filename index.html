<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智能庫存動態看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">📊 智能庫存動態即時看板</h1>
        
        <div class="bg-white p-6 rounded-xl shadow mb-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div class="bg-gray-50 p-4 rounded">
                    <label class="block text-xs text-gray-500">投入總本金 (元)</label>
                    <span id="totalCapital" class="text-xl font-bold">0</span>
                </div>
                <div class="bg-gray-50 p-4 rounded">
                    <label class="block text-xs text-gray-500">目前總現值 (元)</label>
                    <span id="totalValue" class="text-xl font-bold">0</span>
                </div>
                <div class="bg-gray-50 p-4 rounded">
                    <label class="block text-xs text-gray-500">庫存總損益 (元)</label>
                    <span id="totalProfit" class="text-xl font-bold">0</span>
                </div>
                <div class="bg-gray-50 p-4 rounded">
                    <label class="block text-xs text-gray-500">損益百分比</label>
                    <span id="totalPercent" class="text-xl font-bold">0.00%</span>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="addStockRow()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold">➕ 新增股票</button>
                <button onclick="saveData()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold">💾 手動即時存檔</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden mb-6">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white text-sm">
                    <tr>
                        <th class="p-4">代號/名稱</th>
                        <th class="p-4">持股股數</th>
                        <th class="p-4">平均成本 (元)</th>
                        <th class="p-4">當下股價 (元)</th>
                        <th class="p-4">庫存漲跌幅</th>
                        <th class="p-4">操作</th>
                    </tr>
                </thead>
                <tbody id="stockTableBody" class="text-sm"></tbody>
            </table>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-lg font-bold mb-4">📜 歷史交易紀錄與實現損益明細</h2>
            <table class="w-full text-left border">
                <thead class="bg-gray-100 text-sm">
                    <tr>
                        <th class="p-3 border">日期</th>
                        <th class="p-3 border">標的</th>
                        <th class="p-3 border">類型</th>
                        <th class="p-3 border">股數</th>
                        <th class="p-3 border">總額</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody" class="text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        let stocks = JSON.parse(localStorage.getItem('my_stocks')) || [];
        let history = JSON.parse(localStorage.getItem('my_history')) || [];

        function render() {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';
            let tCap = 0, tVal = 0;

            stocks.forEach((s, i) => {
                const row = document.createElement('tr');
                const mVal = s.shares * s.current;
                const cVal = s.shares * s.cost;
                tCap += cVal; tVal += mVal;
                const diff = s.cost > 0 ? (((s.current - s.cost) / s.cost) * 100).toFixed(2) + '%' : '-';
                
                row.innerHTML = `
                    <td class="p-4"><input type="text" value="${s.name}" onchange="stocks[${i}].name=this.value" class="border p-1 w-24"></td>
                    <td class="p-4"><input type="number" value="${s.shares}" onchange="stocks[${i}].shares=Number(this.value);render()" class="border p-1 w-20"></td>
                    <td class="p-4"><input type="number" value="${s.cost}" onchange="stocks[${i}].cost=Number(this.value);render()" class="border p-1 w-20"></td>
                    <td class="p-4"><input type="number" value="${s.current}" onchange="stocks[${i}].current=Number(this.value);render()" class="border p-1 w-20"></td>
                    <td class="p-4 font-bold ${s.current >= s.cost ? 'text-red-600' : 'text-emerald-600'}">${diff}</td>
                    <td class="p-4"><button onclick="del(${i})" class="text-red-500 font-bold">🗑️ 刪除</button></td>
                `;
                tbody.appendChild(row);
            });
            document.getElementById('totalCapital').innerText = tCap.toLocaleString();
            document.getElementById('totalValue').innerText = tVal.toLocaleString();
            document.getElementById('totalProfit').innerText = (tVal - tCap).toLocaleString();
            document.getElementById('totalPercent').innerText = tCap > 0 ? (((tVal - tCap) / tCap) * 100).toFixed(2) + '%' : '0.00%';
            
            const hbody = document.getElementById('historyTableBody');
            hbody.innerHTML = history.map(h => `<tr><td class="p-3 border">${h.date}</td><td class="p-3 border">${h.name}</td><td class="p-3 border">${h.type}</td><td class="p-3 border">${h.shares}</td><td class="p-3 border">${h.total}</td></tr>`).join('');
        }

        function addStockRow() { stocks.push({name: '', shares: 0, cost: 0, current: 0}); render(); }
        function del(i) { stocks.splice(i, 1); render(); }
        function saveData() { 
            localStorage.setItem('my_stocks', JSON.stringify(stocks)); 
            alert('已手動存檔！'); 
        }
        render();
    </script>
</body>
</html>
