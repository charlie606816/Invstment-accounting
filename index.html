<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智能庫存動態即時看板 (測試中)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sort-header { cursor: pointer; user-select: none; }
        .sort-header:hover { background-color: rgba(255,255,255,0.05); }
        .history-sort-header { cursor: pointer; user-select: none; }
        .history-sort-header:hover { background-color: rgba(0,0,0,0.03); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6 text-slate-800 antialiased">
    <div class="max-w-6xl mx-auto">
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-xl font-bold">🦊</div>
            <h1 class="text-2xl font-black text-slate-800 tracking-wide">智能庫存動態即時看板 <span class="text-sm font-semibold bg-slate-900 text-slate-200 px-2 py-0.5 rounded-md ml-1">測試中</span></h1>
        </div>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200/60 mb-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-slate-50/60 p-4 rounded-xl border border-slate-100">
                    <label class="block text-xs font-bold text-slate-400 mb-1">投入總本金 (元)</label>
                    <span id="totalCapital" class="text-xl font-bold text-slate-700 tracking-tight">0</span>
                </div>
                <div class="bg-slate-50/60 p-4 rounded-xl border border-slate-100">
                    <label class="block text-xs font-bold text-slate-400 mb-1">目前總現值 (元)</label>
                    <span id="totalValue" class="text-xl font-bold text-slate-700 tracking-tight">0</span>
                </div>
                <div class="bg-slate-50/60 p-4 rounded-xl border border-slate-100">
                    <label class="block text-xs font-bold text-slate-400 mb-1">庫存總損益金額 (元)</label>
                    <span id="totalProfit" class="text-xl font-bold text-slate-700 tracking-tight">0</span>
                </div>
                <div class="bg-slate-50/60 p-4 rounded-xl border border-slate-100">
                    <label class="block text-xs font-bold text-slate-400 mb-1">總損益百分比 (%)</label>
                    <span id="totalPercent" class="text-xl font-bold text-slate-700 tracking-tight">0.00%</span>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-4 items-center">
                <button onclick="addStockRow()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-bold transition flex items-center gap-1 shadow-sm text-sm">
                    <span>＋</span> 新增股票
                </button>
                <button onclick="refreshAllPrices()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold transition flex items-center gap-1 shadow-sm text-sm">
                    <span>🔄</span> 核心強制刷新所有股價
                </button>
                <button onclick="saveData()" class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-xl font-bold transition flex items-center gap-1 shadow-sm text-sm">
                    <span>💾</span> 手動即時存檔
                </button>
                <span id="sysStatus" class="text-xs text-slate-400 flex items-center gap-1.5 ml-2 font-medium">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 系統官方連線正常
                </span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden mb-6">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-slate-200 text-xs font-bold uppercase tracking-wider">
                        <tr>
                            <th class="p-4 pl-6 sort-header" onclick="setSort('name')">代號/名稱 <span id="sort_name">↕️</span></th>
                            <th class="p-4">持股股數</th>
                            <th class="p-4">平均成本 (元)</th>
                            <th class="p-4 sort-header" onclick="setSort('current')">當下股價 (元) <span id="sort_current">↕️</span></th>
                            <th class="p-4 sort-header" onclick="setSort('ratio')">庫存漲跌幅 <span id="sort_ratio">↕️</span></th>
                            <th class="p-4 sort-header" onclick="setSort('value')">目前市值 <span id="sort_value">↕️</span></th>
                            <th class="p-4 sort-header" onclick="setSort('weight')">本金占比 <span id="sort_weight">↕️</span></th>
                            <th class="p-4 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody" class="text-sm divide-y divide-slate-100 font-medium">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200/60 mb-12">
            <div class="flex flex-wrap justify-between items-center gap-4 border-b border-slate-100 pb-4 mb-4">
                <div class="flex items-center gap-2">
                    <span class="text-lg">📜</span>
                    <h2 class="text-base font-bold text-slate-700">歷史明細多功能查找與管理中心</h2>
                </div>
                <button onclick="clearHistory()" class="bg-slate-100 hover:bg-slate-200 text-slate-500 text-xs px-3 py-1.5 rounded-lg font-bold transition">🗑️ 清空歷史紀錄</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">🔍 標的快速篩選</label>
                    <select id="filterName" onchange="renderHistory()" class="w-full border border-slate-200 rounded-xl p-2 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 font-semibold text-slate-700">
                        <option value="all">顯示全部標的</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">📅 開始日期</label>
                    <input type="date" id="filterStart" onchange="renderHistory()" class="w-full border border-slate-200 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-slate-500 font-semibold text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">📅 結束日期</label>
                    <input type="date" id="filterEnd" onchange="renderHistory()" class="w-full border border-slate-200 rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-slate-500 font-semibold text-slate-700">
                </div>
            </div>

            <div class="overflow-x-auto mb-4">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 text-slate-600 text-xs font-bold uppercase tracking-wider border-b border-slate-200">
                        <tr>
                            <th class="p-3 pl-4 history-sort-header" onclick="setHistorySort('date')">交易日期 <span id="hsort_date">↕️</span></th>
                            <th class="p-3">股票標的</th>
                            <th class="p-3">交易類型</th>
                            <th class="p-3 history-sort-header" onclick="setHistorySort('shares')">異動股數 <span id="hsort_shares">↕️</span></th>
                            <th class="p-3">交易單價</th>
                            <th class="p-3 history-sort-header" onclick="setHistorySort('total')">交易總額 <span id="hsort_total">↕️</span></th>
                            <th class="p-3 pr-4 history-sort-header" onclick="setHistorySort('profit')">該筆實現損益 <span id="hsort_profit">↕️</span></th>
                            <th class="p-3 text-center">歷史操作</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody" class="text-sm divide-y divide-slate-100 font-medium text-slate-600">
                    </tbody>
                </table>
            </div>

            <div class="flex justify-end pt-2 border-t border-slate-100">
                <div class="bg-slate-900 text-white px-5 py-3 rounded-xl shadow-sm text-right min-w-[280px]">
                    <span class="block text-xs font-medium text-slate-400 mb-0.5">💡 當前篩選條件下之實現損益總計</span>
                    <span id="filteredProfitTotal" class="text-lg font-bold font-mono">$0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let stocks = JSON.parse(localStorage.getItem('my_stocks')) || [];
        let history = JSON.parse(localStorage.getItem('my_history')) || [];
        let localLastUpdated = Number(localStorage.getItem('my_last_updated')) || 0;
        
        let activeTradeIndex = null;
        let editingHistoryId = null; 

        let currentSortField = null; 
        let currentSortOrder = 'asc'; 

        let historySortField = 'date';
        let historySortOrder = 'desc';

        // 定時器變數
        let autoRefreshInterval = null;

        const stockDatabase = {
            "2330": "台積電", "0056": "元大高股息", "00878": "國泰永續高股息", "00919": "群益台灣精選高息", 
            "00929": "復華台灣科技優息", "3661": "世芯-KY", "4966": "譜瑞-KY", "6515": "穎崴",
            "2317": "鴻海", "2454": "聯發科", "2382": "廣達", "3231": "緯創", "3037": "欣興", "3044": "健鼎", "2379": "瑞昱"
        };

        function updateStatus(msg, isError = false) {
            const el = document.getElementById('sysStatus');
            if (!el) return;
            if (isError) {
                el.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> <span class="text-red-500 font-bold">${msg}</span>`;
            } else {
                el.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> <span class="text-slate-500">${msg}</span>`;
            }
        }

        function setSort(field) {
            if (currentSortField === field) {
                currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortField = field;
                currentSortOrder = 'desc';
            }
            ['name', 'current', 'ratio', 'value', 'weight'].forEach(f => {
                const el = document.getElementById(`sort_${f}`);
                if(el) el.innerText = '↕️';
            });
            document.getElementById(`sort_${field}`).innerText = currentSortOrder === 'asc' ? '🔼' : '🔽';
            render();
        }

        function setHistorySort(field) {
            if (historySortField === field) {
                historySortOrder = historySortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                historySortField = field;
                historySortOrder = 'desc';
            }
            ['date', 'shares', 'total', 'profit'].forEach(f => {
                const el = document.getElementById(`hsort_${f}`);
                if(el) el.innerText = '↕️';
            });
            document.getElementById(`hsort_${field}`).innerText = historySortOrder === 'asc' ? '🔼' : '🔽';
            renderHistory();
        }

        function ensureHistoryIds() {
            let changed = false;
            history.forEach(h => {
                if (!h.id) {
                    h.id = 'h_' + Math.random().toString(36).substr(2, 9) + Date.now();
                    changed = true;
                }
            });
            if(changed) {
                localStorage.setItem('my_history', JSON.stringify(history));
                updateLocalTimestamp();
            }
        }

        function updateLocalTimestamp() {
            localLastUpdated = Date.now();
            localStorage.setItem('my_last_updated', localLastUpdated);
        }

        function recalculateStocksFromHistory() {
            let sortedHistory = [...history].reverse();
            let stockMap = {};

            sortedHistory.forEach(h => {
                if (!stockMap[h.name]) {
                    stockMap[h.name] = { shares: 0, totalCost: 0, currentCost: 0 };
                }
                
                let current = stockMap[h.name];
                
                if (h.type === '買入') {
                    current.totalCost += (h.shares * h.price);
                    current.shares += h.shares;
                    current.currentCost = current.shares > 0 ? Number((current.totalCost / current.shares).toFixed(2)) : 0;
                } else if (h.type === '賣出') {
                    h.profit = (h.price - current.currentCost) * h.shares;
                    current.shares -= h.shares;
                    if (current.shares <= 0) {
                        current.shares = 0;
                        current.totalCost = 0;
                        current.currentCost = 0;
                    } else {
                        current.totalCost = current.shares * current.currentCost;
                    }
                }
            });

            stocks.forEach(s => {
                if (s.name && stockMap[s.name]) {
                    s.shares = stockMap[s.name].shares;
                    s.cost = stockMap[s.name].currentCost;
                } else if (s.name) {
                    s.shares = 0;
                    s.cost = 0;
                }
            });

            stocks = stocks.filter(s => s.name === '' || s.shares > 0 || (s.shares === 0 && s.cost === 0 && !history.some(h => h.name === s.name)));

            localStorage.setItem('my_stocks', JSON.stringify(stocks));
            localStorage.setItem('my_history', JSON.stringify(history));
            updateLocalTimestamp();
        }

        function render() {
            ensureHistoryIds();
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';
            
            let tCap = 0, tVal = 0;
            stocks.forEach(s => {
                tCap += Number(s.shares) * Number(s.cost);
                tVal += Number(s.shares) * Number(s.current);
            });

            let displayStocks = stocks.map((s, idx) => ({ ...s, originalIndex: idx }));

            if (currentSortField) {
                displayStocks.sort((a, b) => {
                    let valA = 0, valB = 0;
                    if (currentSortField === 'name') {
                        valA = a.name; valB = b.name;
                        return currentSortOrder === 'asc' ? valA.localeCompare(valB, 'zh-TW') : valB.localeCompare(valA, 'zh-TW');
                    } else if (currentSortField === 'current') {
                        valA = Number(a.current); valB = Number(b.current);
                    } else if (currentSortField === 'ratio') {
                        valA = a.cost > 0 ? (a.current - a.cost) / a.cost : 0;
                        valB = b.cost > 0 ? (b.current - b.cost) / b.cost : 0;
                    } else if (currentSortField === 'value') {
                        valA = Number(a.shares) * Number(a.current);
                        valB = Number(b.shares) * Number(b.current);
                    } else if (currentSortField === 'weight') {
                        valA = Number(a.shares) * Number(a.cost);
                        valB = Number(b.shares) * Number(b.cost);
                    }
                    return currentSortOrder === 'asc' ? valA - valB : valB - valA;
                });
            }

            if (stocks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-8 text-center text-slate-400 bg-slate-50 rounded-b-2xl">目前無庫存資料，請點擊上方「＋ 新增股票」輸入台股代號。</td></tr>`;
            } else {
                displayStocks.forEach((s, idx) => {
                    const i = s.originalIndex; 
                    const cost = Number(s.cost) || 0;
                    const current = Number(s.current) || 0;
                    const marketVal = Number(s.shares) * current;
                    const diffRatio = cost > 0 ? ((current - cost) / cost * 100).toFixed(2) : '0.00';
                    const capWeight = tCap > 0 ? (((Number(s.shares) * cost) / tCap) * 100).toFixed(2) + '%' : '0.00%';
                    
                    const isProfit = current >= cost;
                    const colorClass = isProfit ? 'text-red-600' : 'text-emerald-600';
                    const zebraBg = idx % 2 === 1 ? 'bg-slate-50/50' : 'bg-white';

                    const row = document.createElement('tr');
                    row.className = `${zebraBg} hover:bg-slate-50 transition duration-150`;
                    row.innerHTML = `
                        <td class="p-4 pl-6">
                            <input type="text" value="${s.name}" placeholder="輸入代號 (如: 2330)" 
                                onchange="handleStockCodeChange(${i}, this.value)" 
                                class="border border-slate-200 p-1.5 rounded-xl w-44 bg-white text-blue-600 font-bold focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm shadow-sm">
                        </td>
                        <td class="p-4">
                            <input type="number" value="${s.shares}" readonly class="border border-slate-100 p-1.5 rounded-xl w-24 text-slate-500 bg-slate-100/80 cursor-not-allowed font-semibold text-center">
                        </td>
                        <td class="p-4">
                            <input type="number" value="${cost}" readonly class="border border-slate-100 p-1.5 rounded-xl w-24 text-slate-500 bg-slate-100/80 cursor-not-allowed font-semibold text-center">
                        </td>
                        <td class="p-4">
                            <input type="number" value="${current}" readonly class="border border-slate-100 p-1.5 rounded-xl w-24 text-slate-600 bg-slate-100/80 cursor-not-allowed font-bold text-center">
                        </td>
                        <td class="p-4 font-black ${colorClass}">${isProfit ? '+' : ''}${diffRatio}%</td>
                        <td class="p-4 text-slate-600 font-semibold">$${Math.round(marketVal).toLocaleString()}</td>
                        <td class="p-4 text-slate-400 font-medium">${capWeight}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-2">
                                <button onclick="toggleInlineTrade(${i})" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1.5 rounded-xl text-xs font-bold transition shadow-sm">🔄 交易</button>
                                <button onclick="delRow(${i})" class="bg-red-50 text-red-500 hover:bg-red-100 px-3 py-1.5 rounded-xl text-xs font-bold transition">🗑️ 刪除</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);

                    if (activeTradeIndex === i) {
                        const today = new Date().toISOString().split('T')[0];
                        const tradeRow = document.createElement('tr');
                        tradeRow.className = "bg-slate-100/70 border-l-4 border-blue-600 transition-all duration-200";
                        tradeRow.innerHTML = `
                            <td colspan="8" class="p-4 pl-8">
                                <div class="flex flex-wrap items-center gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-md max-w-5xl" onclick="event.stopPropagation()">
                                    <div class="text-xs font-black text-blue-700 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100">帳目異動面板 ➔ <span id="panelLabel_${i}">${s.name||'未命名'}</span></div>
                                    
                                    <div class="flex items-center gap-1.5">
                                        <span class="text-xs font-bold text-slate-500">交易日期:</span>
                                        <input type="date" id="inlineDate_${i}" value="${today}" class="border border-slate-200 rounded-lg p-1.5 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>

                                    <div class="flex items-center gap-1.5">
                                        <span class="text-xs font-bold text-slate-500">類型:</span>
                                        <select id="inlineType_${i}" class="border border-slate-200 rounded-lg p-1.5 text-sm bg-white font-bold text-slate-700 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                            <option value="買入">➕ 買進 (增加庫存/攤平)</option>
                                            <option value="賣出">➖ 賣出 (實現獲利/減持)</option>
                                        </select>
                                    </div>

                                    <div class="flex items-center gap-1.5">
                                        <span class="text-xs font-bold text-slate-500">股數:</span>
                                        <input type="number" id="inlineShares_${i}" placeholder="0" class="border border-slate-200 rounded-lg p-1.5 text-sm w-24 text-center font-bold focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>

                                    <div class="flex items-center gap-1.5">
                                        <span class="text-xs font-bold text-slate-500">單價:</span>
                                        <input type="number" id="inlinePrice_${i}" value="${s.current || 0}" step="0.01" class="border border-slate-200 rounded-lg p-1.5 text-sm w-24 text-center font-bold focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>

                                    <div class="flex gap-2 ml-auto">
                                        <button onclick="submitInlineTransaction(${i})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm transition">確認提交</button>
                                        <button onclick="toggleInlineTrade(null)" class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-3 py-1.5 rounded-lg text-xs font-bold transition">取消</button>
                                    </div>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tradeRow);
                    }
                });
            }

            const profitVal = tVal - tCap;
            document.getElementById('totalCapital').innerText = Math.round(tCap).toLocaleString();
            document.getElementById('totalValue').innerText = Math.round(tVal).toLocaleString();
            
            const pBox = document.getElementById('totalProfit');
            pBox.innerText = (profitVal >= 0 ? '+' : '') + Math.round(profitVal).toLocaleString();
            pBox.className = `text-xl font-black ${profitVal >= 0 ? 'text-red-600' : 'text-emerald-600'}`;

            const pctBox = document.getElementById('totalPercent');
            pctBox.innerText = (profitVal >= 0 ? '+' : '') + (tCap > 0 ? ((profitVal / tCap) * 100).toFixed(2) : '0.00') + '%';
            pctBox.className = `text-xl font-black ${profitVal >= 0 ? 'text-red-600' : 'text-emerald-600'}`;

            renderHistory();
        }

        function toggleInlineTrade(index) {
            activeTradeIndex = (activeTradeIndex === index) ? null : index;
            render();
        }

        function submitInlineTransaction(i) {
            const tradeDate = document.getElementById(`inlineDate_${i}`).value;
            const type = document.getElementById(`inlineType_${i}`).value;
            const num = Number(document.getElementById(`inlineShares_${i}`).value);
            const price = Number(document.getElementById(`inlinePrice_${i}`).value);
            
            if (!stocks[i].name) { updateStatus("❌ 提交失敗：股票代號尚未輸入或未載入成功！", true); return; }
            if (!tradeDate) { updateStatus("❌ 提交失敗：請選擇正確的交易日期！", true); return; }
            if (!num || num <= 0 || !price || price <= 0) { updateStatus("❌ 提交失敗：股數與單價必須大於 0！", true); return; }

            if (type === '賣出' && num > Number(stocks[i].shares)) {
                updateStatus(`❌ 錯誤：賣出股數 (${num}) 大於現有庫存 (${stocks[i].shares})！`, true);
                return;
            }

            const uniqueId = 'h_' + Math.random().toString(36).substr(2, 9) + Date.now();
            history.unshift({ 
                id: uniqueId,
                date: tradeDate, 
                name: stocks[i].name, 
                type: type, 
                shares: num, 
                price: price, 
                total: num * price, 
                profit: 0 
            });

            activeTradeIndex = null; 
            recalculateStocksFromHistory();
            updateStatus(`✅ 交易紀錄成功提交！庫存已同步重算。`);
            render();
            updateFilterOptions();
        }

        function renderHistory() {
            const fName = document.getElementById('filterName').value;
            const startStr = document.getElementById('filterStart').value;
            const endStr = document.getElementById('filterEnd').value;
            const hbody = document.getElementById('historyTableBody');
            if(!hbody) return;
            hbody.innerHTML = '';

            let filtered = history.filter(h => {
                if (fName !== 'all' && h.name !== fName) return false;
                if (startStr && h.date < startStr) return false;
                if (endStr && h.date > endStr) return false;
                return true;
            });

            if (historySortField) {
                filtered.sort((a, b) => {
                    let vA, vB;
                    if(historySortField === 'date') {
                        vA = a.date; vB = b.date;
                        return historySortOrder === 'asc' ? vA.localeCompare(vB) : vB.localeCompare(vA);
                    } else if(historySortField === 'shares') {
                        vA = Number(a.shares); vB = Number(b.shares);
                    } else if(historySortField === 'total') {
                        vA = Number(a.total); vB = Number(b.total);
                    } else if(historySortField === 'profit') {
                        vA = Number(a.profit); vB = Number(b.profit);
                    }
                    return historySortOrder === 'asc' ? vA - vB : vB - vA;
                });
            }

            let totalFilteredProfit = 0;
            filtered.forEach(h => {
                if(h.type === '賣出') totalFilteredProfit += (Number(h.profit) || 0);
            });

            const profitBox = document.getElementById('filteredProfitTotal');
            if(profitBox) {
                profitBox.innerText = (totalFilteredProfit >= 0 ? '+$' : '-$') + Math.abs(Math.round(totalFilteredProfit)).toLocaleString();
                profitBox.className = `text-lg font-bold font-mono ${totalFilteredProfit >= 0 ? 'text-red-400' : 'text-emerald-400'}`;
            }

            if(filtered.length === 0) {
                hbody.innerHTML = `<tr><td colspan="8" class="p-4 text-center text-slate-400 bg-slate-50/50">沒有符合當前篩選條件的歷史明細項目</td></tr>`;

            filtered.forEach((h, idx) => {

                tr.className = `${zebraBg} hover:bg-slate-50 transition duration-150`;

                if (editingHistoryId === h.id) {
                    tr.innerHTML = `
                        <td class="p-2 pl-4"><input type="date" id="editDate_${h.id}" value="${h.date}" class="border border-slate-300 rounded p-1 text-xs font-semibold focus:outline-none focus:ring-1 focus:ring-blue-500"></td>
                        <td class="p-2 font-semibold text-slate-700 text-xs">${h.name}</td>
                        <td class="p-2"><span class="px-2 py-0.5 rounded text-xs bg-slate-100 font-bold">${h.type}</span></td>
                        <td class="p-2"><input type="number" id="editShares_${h.id}" value="${h.shares}" class="border border-slate-300 rounded p-1 text-xs w-20 text-center font-semibold focus:outline-none focus:ring-1 focus:ring-blue-500"></td>
                        <td class="p-2"><input type="number" id="editPrice_${h.id}" value="${h.price}" step="0.01" class="border border-slate-300 rounded p-1 text-xs w-20 text-center font-semibold focus:outline-none focus:ring-1 focus:ring-blue-500"></td>
                        <td class="p-2 text-xs text-slate-400">系統全自動重算</td>
                        <td class="p-2 text-xs text-slate-400">系統全自動重算</td>
                        <td class="p-2 text-center">
                            <div class="flex justify-center gap-1.5">
                                <button onclick="saveHistoryRow('${h.id}')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-2 py-1 rounded text-xs font-bold shadow-sm">💾 儲存</button>
                                <button onclick="cancelHistoryEdit()" class="bg-slate-200 hover:bg-slate-300 text-slate-600 px-2 py-1 rounded text-xs font-bold">取消</button>
                            </div>

                } else {
                    const displayType = h.type === '買入' ? '➕ 買進' : '➖ 賣出';
                    const typeColor = h.type === '買入' ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600';
                    tr.innerHTML = `
                        <td class="p-3 pl-4 text-slate-500 text-xs">${h.date}</td>
                        <td class="p-3 font-bold text-slate-700">${h.name}</td>

                        <td class="p-3 font-semibold">${h.shares.toLocaleString()}</td>
                        <td class="p-3 font-semibold">$${h.price.toLocaleString()}</td>
                        <td class="p-3 font-mono text-xs text-slate-500">$${Math.round(h.total).toLocaleString()}</td>
                        <td class="p-3 font-bold ${h.profit >= 0 ? 'text-red-500' : 'text-emerald-500'}">${h.type === '賣出' ? '$' + Math.round(h.profit).toLocaleString() : '--'}</td>
                        <td class="p-3 text-center">
                            <div class="flex justify-center gap-2">
                                <button onclick="editHistoryRow('${h.id}')" class="text-slate-400 hover:text-blue-600 px-1 py-0.5 rounded text-xs font-bold transition">✏️ 編輯</button>
                                <button onclick="deleteHistoryRow('${h.id}')" class="text-slate-400 hover:text-red-500 px-1 py-0.5 rounded text-xs font-bold transition">🗑️ 刪除</button>
                            </div>

                }
                hbody.appendChild(tr);
            });
        }

        function editHistoryRow(id) { editingHistoryId = id; renderHistory(); }
        function cancelHistoryEdit() { editingHistoryId = null; renderHistory(); }

        function saveHistoryRow(id) {
            const newDate = document.getElementById(`editDate_${id}`).value;
            const newShares = Number(document.getElementById(`editShares_${id}`).value);
            const newPrice = Number(document.getElementById(`editPrice_${id}`).value);

            if (!newDate || newShares <= 0 || newPrice <= 0) {
                updateStatus("❌ 儲存失敗：請輸入有效的日期、數量與金額數值！", true);
                return;
            }

            const targetIdx = history.findIndex(h => h.id === id);
            if (targetIdx !== -1) {
                history[targetIdx].date = newDate;
                history[targetIdx].shares = newShares;
                history[targetIdx].price = newPrice;
                history[targetIdx].total = newShares * newPrice;
                
                recalculateStocksFromHistory();
                updateStatus("✅ 歷史紀錄已成功更新，上方持股與成本已完全同步重算！");
            }

            editingHistoryId = null;
            render();
        }

        function deleteHistoryRow(id) {
            history = history.filter(h => h.id !== id);
            recalculateStocksFromHistory();
            updateStatus("🗑️ 歷史項目已移出，上方活體庫存與平均成本已全自動對齊！");
            render();
            updateFilterOptions();
        }

        // 🌟 【強化股價抓取核心：加入防快取機制與時間戳記】 🌟
        async function fetchRealTWPrice(code) {
            const cleanCode = code.replace(/\D/g, '');
            if(!cleanCode) return null;

            // 核心優化：產生隨機時間戳記防快取
            const cacheBuster = `&_t=${Date.now()}`;

            const yahooUrls = [
                `https://query1.finance.yahoo.com/v8/finance/chart/${cleanCode}.TW?interval=1d&range=1d${cacheBuster}`,
                `https://query1.finance.yahoo.com/v8/finance/chart/${cleanCode}.TWO?interval=1d&range=1d${cacheBuster}`
            ];

            for(let url of yahooUrls) {
                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    if(res.ok) {
                        const wrapper = await res.json();
                        const data = JSON.parse(wrapper.contents);
                        if (data && data.chart && data.chart.result && data.chart.result[0]) {
                            const meta = data.chart.result[0].meta;
                            const price = meta.regularMarketPrice;
                            
                            if(price && price > 0) {
                                let officialName = stockDatabase[cleanCode] || meta.symbol.replace('.TW','').replace('.TWO','');
                                return { price: Number(price), name: officialName };
                            }
                        }
                    }
                } catch(e) { console.log(`Yahoo 通道連線中斷或受阻，嘗試切換備用通道...`); }
            }

            try {
                const twseUrl = `https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL?_t=${Date.now()}`;
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(twseUrl)}`);
                if(res.ok) {
                    const wrapper = await res.json();
                    const data = JSON.parse(wrapper.contents);
                    if (Array.isArray(data)) {
                        const matched = data.find(item => item.Code === cleanCode);
                        if (matched && matched.ClosingPrice) {
                            const price = Number(matched.ClosingPrice);
                            if(price > 0) {
                                return { price: price, name: matched.Name || stockDatabase[cleanCode] };
                            }
                        }
                    }
                }
            } catch(e) { console.log("備用官方通道亦受限。"); }

            return null; 
        }

        async function handleStockCodeChange(index, value) {
            const codeMatch = value.match(/\d+/);
            if (!codeMatch) return;
            const code = codeMatch[0];
            
            const isDuplicate = stocks.some((s, idx) => idx !== index && s.name.includes(code));
            if (isDuplicate) {
                updateStatus(`⚠️ 提示：庫存中已有代號 ${code} 的標的，請直接在該列點擊「交易」異動活體帳目即可。`, true);
                return;
            }

            updateStatus(`🔍 正在連線查詢台灣官方數據庫 ${code} ...`);

            const result = await fetchRealTWPrice(code);
            let finalName = "";
            let finalPrice = 100;

            if(result) {
                finalName = `${code} ${result.name}`;
                finalPrice = result.price;
                updateStatus(`✅ 數據載入成功: ${code} ${result.name} ($${result.price})`);
            } else {
                let fallbackName = stockDatabase[code] || "台灣個股";
                finalName = `${code} ${fallbackName}`;
                if(stocks[index] && stocks[index].current > 0) finalPrice = stocks[index].current;
                updateStatus(`⚠️ 目前官方網路通道繁忙，已使用本機暫存股價，請稍後點擊刷新！`, true);
            }

            stocks[index].name = finalName;
            stocks[index].current = finalPrice;

            const inputs = document.querySelectorAll('#stockTableBody input[type="text"]');
            if(inputs[index]) {
                inputs[index].value = finalName;
            }
            const labelEl = document.getElementById(`panelLabel_${index}`);
            if(labelEl) {
                labelEl.innerText = finalName;
            }
            const priceInput = document.getElementById(`inlinePrice_${index}`);
            if(priceInput) {
                priceInput.value = finalPrice;
            }

            updateLocalTimestamp();
            updateFilterOptions();
        }

        // 🌟 【智慧化股價批量更新機制】 🌟
        async function refreshAllPrices() {
            if(stocks.length === 0) {
                updateStatus(`💡 目前名單中無任何股票持股，無需更新。`);
                return;
            }

            updateStatus(`🔄 開始強制批量同步所有官方市場最新股價...`);
            
            let successCount = 0;
            let failList = [];

            for(let i=0; i<stocks.length; i++) {
                if(!stocks[i].name) continue;
                const codeMatch = stocks[i].name.match(/\d+/);
                if(codeMatch) {
                    const code = codeMatch[0];
                    updateStatus(`⏳ [${i+1}/${stocks.length}] 正在同步 ${stocks[i].name} ...`);
                    
                    const result = await fetchRealTWPrice(code);
                    if(result && result.price > 0) {
                        stocks[i].current = result.price;
                        successCount++;
                    } else {
                        failList.push(code);
                    }
                }
            }

            // 取得當前時間
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            if (failList.length === 0) {
                updateStatus(`✅ 完美同步 (${timeStr})！所有個股與 ETF (${successCount}檔) 股價已完全同步至最新市價！`);
            } else if (successCount > 0) {
                updateStatus(`⚠️ 部分更新 (${timeStr})：成功同步 ${successCount} 檔。但個股 [${failList.join(', ')}] 連線阻斷，已維持原快取價。`, true);
            } else {
                updateStatus(`❌ 全面同步失敗 (${timeStr})：因目前外部 API 代理網域流量過大受限，已維持原價格。`, true);
            }

            localStorage.setItem('my_stocks', JSON.stringify(stocks));
            updateLocalTimestamp();
            render();
        }

        function startAutoRefresh() {
            if(autoRefreshInterval) clearInterval(autoRefreshInterval);
            // 設定每 60 秒 (60000 毫秒) 自動執行一次批量刷新
            autoRefreshInterval = setInterval(() => {
                console.log("「自動校對機制」啟動：執行每分鐘定時背景同步...");
                refreshAllPrices();
            }, 60000);
        }

        function addStockRow() { 
            stocks.push({name: '', shares: 0, cost: 0, current: 0}); 
            activeTradeIndex = stocks.length - 1; 
            render(); 
        }
        
        function delRow(i) { 
            let targetName = stocks[i].name;
            stocks.splice(i, 1); 
            activeTradeIndex = null; 
            
            if (targetName) {
                history = history.filter(h => h.name !== targetName);
            }
            
            recalculateStocksFromHistory();
            updateStatus("🗑️ 庫存個股與關聯歷史已成功連動移除");
            render(); 
            updateFilterOptions(); 
        }

        function updateFilterOptions() {
            const select = document.getElementById('filterName');
            if(!select) return;
            const currentSelected = select.value;
            select.innerHTML = '<option value="all">顯示全部標的</option>';
            
            let names = stocks.map(s => s.name).concat(history.map(h => h.name));
            const uniqueNames = [...new Set(names)].filter(Boolean);
            
            uniqueNames.forEach(n => { select.innerHTML += `<option value="${n}">${n}</option>`; });
            if(uniqueNames.includes(currentSelected)) select.value = currentSelected;
        }

        function clearHistory() { 
            history = []; 
            stocks = [];
            localStorage.setItem('my_history', JSON.stringify(history)); 
            localStorage.setItem('my_stocks', JSON.stringify(stocks));
            updateLocalTimestamp();
            updateStatus("🗑️ 帳目已全面初始化清空");
            render(); 
            updateFilterOptions();
        }
        
        function saveData() { 
            localStorage.setItem('my_stocks', JSON.stringify(stocks)); 
            localStorage.setItem('my_history', JSON.stringify(history)); 
            updateLocalTimestamp();
            updateStatus('💾 數據已安全同步儲存至本地瀏覽器！'); 
            if (gapi.client && gapi.client.getToken() !== null) {
                saveDataToGoogleDrive(true);
            }
        }

        recalculateStocksFromHistory();
        updateFilterOptions();
        render();
        
        // 網頁開啟 1.5 秒後進行首次載入，並同步啟動「每分鐘自動刷新定時器」
        setTimeout(() => {
            refreshAllPrices();
            startAutoRefresh();
        }, 1500);
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        const API_KEY = 'AIzaSyBNIkGGSmbqt2TM7xBLxDX0RtwFfv2W_Es'; 
        const CLIENT_ID = '354816403373-0p617aj4j2b51rffidt2hstq203lh814.apps.googleusercontent.com';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata'; 
        const FILE_NAME = 'investment_accounting_backup.json'; 

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let cloudFileId = null; 

        function gapiLoaded() { gapi.load('client', initGapiClient); }
        async function initGapiClient() {
            try {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: DISCOVERY_DOCS });
                gapiInited = true; checkAndAppendAuthButton();
            } catch (e) { console.error("GAPI 初始化失敗", e); }
        }
        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES, callback: '', 
            });
            gisInited = true; checkAndAppendAuthButton();
        }

        function checkAndAppendAuthButton() {
            if (gapiInited && gisInited && !document.getElementById('google-sync-btn')) {
                const btn = document.createElement('button');
                btn.id = 'google-sync-btn';
                btn.innerHTML = '🔄 登入 Google 同步雲端資料';
                btn.style = 'position:fixed; bottom:20px; right:20px; z-index:9999; padding:10px 16px; background:#4285F4; color:white; border:none; border-radius:50px; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition: background 0.3s ease;';
                btn.onclick = handleAuthClick;
                document.body.appendChild(btn);
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                updateSyncBtnStatus('syncing', '⏳ 雙向同步比對中...');
                await syncDataWithGoogleDrive();
            };
            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        function updateSyncBtnStatus(status, text) {
            const btn = document.getElementById('google-sync-btn');
            if (!btn) return;
            btn.innerHTML = text;
            if (status === 'syncing') {
                btn.style.background = '#007bff';
                btn.disabled = true;
            } else if (status === 'success') {
                btn.style.background = '#34A853';
                btn.disabled = false;
            } else if (status === 'error') {
                btn.style.background = '#EA4335';
                btn.disabled = false;
            }
        }

        async function syncDataWithGoogleDrive() {
            try {
                const response = await gapi.client.drive.files.list({
                    spaces: 'appDataFolder', fields: 'files(id, name)', q: `name = '${FILE_NAME}'`
                });
                const files = response.result.files;

                if (files && files.length > 0) {
                    cloudFileId = files[0].id;
                    const fileContent = await gapi.client.drive.files.get({ fileId: cloudFileId, alt: 'media' });
                    
                    if (fileContent.result) {
                        const cloudPack = fileContent.result;
                        const cloudTime = cloudPack.lastUpdated || 0;

                        if (cloudTime > localLastUpdated) {
                            stocks = cloudPack.stocks || [];
                            history = cloudPack.history || [];
                            localLastUpdated = cloudTime;

                            localStorage.setItem('my_stocks', JSON.stringify(stocks));
                            localStorage.setItem('my_history', JSON.stringify(history));
                            localStorage.setItem('my_last_updated', localLastUpdated);
                            
                            updateFilterOptions();
                            render();
                            
                            const now = new Date();
                            updateSyncBtnStatus('success', `✅ 已自雲端更新 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`);
                        } else if (localLastUpdated > cloudTime) {
                            await saveDataToGoogleDrive();
                            const now = new Date();
                            updateSyncBtnStatus('success', `✅ 已同步至雲端 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`);
                        } else {
                            const now = new Date();
                            updateSyncBtnStatus('success', `✅ 資料已是最新 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`);
                        }
                    }
                } else {
                    await saveDataToGoogleDrive();
                    updateSyncBtnStatus('success', '🆕 雲端備份成功建立！');
                }
            } catch (err) {
                console.error("雙向同步失敗", err);
                updateSyncBtnStatus('error', '❌ 同步失敗，請重試');
            }
        }

        async function saveDataToGoogleDrive(isSilent = false) {
            const localPack = {
                stocks: stocks,
                history: history,
                lastUpdated: localLastUpdated
            };
            const payloadStr = JSON.stringify(localPack);
            
            try {
                if (!cloudFileId) {
                    const response = await gapi.client.drive.files.list({
                        spaces: 'appDataFolder', fields: 'files(id, name)', q: `name = '${FILE_NAME}'`
                    });
                    if (response.result.files && response.result.files.length > 0) {
                        cloudFileId = response.result.files[0].id;
                    }
                }

                if (cloudFileId) {
                    await gapi.client.request({
                        path: `/upload/drive/v3/files/${cloudFileId}`,
                        method: 'PATCH',
                        params: { uploadType: 'media' },
                        body: payloadStr
                    });
                    console.log("資料默默成功同步更新至 Google 雲端！");
                } else {
                    const metadata = { 'name': FILE_NAME, 'parents': ['appDataFolder'] };
                    const boundary = 'foo_bar_baz';
                    const delimiter = `\r\n--${boundary}\r\n`;
                    const close_delim = `\r\n--${boundary}--`;
                    
                    const multipartRequestBody =
                        delimiter +
                        'Content-Type: application/json\r\n\r\n' +
                        JSON.stringify(metadata) +
                        delimiter +
                        'Content-Type: application/json\r\n\r\n' +
                        payloadStr +
                        close_delim;

                    const request = await gapi.client.request({
                        path: '/upload/drive/v3/files',
                        method: 'POST',
                        params: { uploadType: 'multipart' },
                        headers: { 'Content-Type': `multipart/related; boundary="${boundary}"` },
                        body: multipartRequestBody
                    });
                    cloudFileId = request.result.id;
                    console.log("全新雲端備份檔案建立成功！");
                }
                if(!isSilent) {
                    const now = new Date();
                    updateSyncBtnStatus('success', `✅ 已同步至雲端 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`);
                }
            } catch (err) {
                console.error("同步至雲端失敗", err);
                if(!isSilent) updateSyncBtnStatus('error', '❌ 同步失敗');
            }
        }

        window.addEventListener('beforeunload', (event) => {
            if (gapi.client && gapi.client.getToken() !== null && cloudFileId) {
                const localPack = { stocks: stocks, history: history, lastUpdated: localLastUpdated };
                const accessToken = gapi.client.getToken().access_token;
                
                fetch(`https://www.googleapis.com/upload/drive/v3/files/${cloudFileId}?uploadType=media`, {
                    method: 'PATCH',
                    body: JSON.stringify(localPack),
                    keepalive: true,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    }
                }).catch(e => console.error("背景自動存檔失敗:", e));
            }
        });
    </script>
