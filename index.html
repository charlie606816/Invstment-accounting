<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能庫存動態即時看板</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-7xl mx-auto">
        
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center flex items-center justify-center gap-2">
            <span>🦊</span> 智能庫存動態即時看板 (真實聯網版)
        </h1>
        
        <div class="bg-white p-6 rounded-xl shadow-md mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">投入總本金 (元)</label>
                        <input type="text" id="totalCapital" readonly value="0" class="w-full bg-gray-100 border border-gray-300 rounded-lg p-2 font-bold text-gray-600 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">目前總現值 (元)</label>
                        <input type="text" id="totalCurrentValue" readonly value="0" class="w-full bg-gray-100 border border-gray-300 rounded-lg p-2 font-bold text-gray-600 focus:outline-none">
                    </div>
                </div>

                <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 flex flex-col justify-center items-center h-full min-h-[140px] shadow-inner">
                    <span class="text-sm font-medium text-gray-500 mb-1">庫存總損益概況</span>
                    <div id="totalProfitLossAmount" class="text-2xl font-black tracking-wide text-gray-700 my-1">+$0</div>
                    <div id="totalProfitLossPercent" class="text-sm font-bold bg-gray-200 px-3 py-1 rounded-full text-gray-600 mt-1">0.00%</div>
                </div>

                <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-3 h-full items-end">
                    <button onclick="addStockRow()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-lg shadow transition cursor-pointer">
                        ➕ 新增股票
                    </button>
                    <button onclick="fetchCurrentPrices()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow transition cursor-pointer">
                        🔄 全自動同步最新股價
                    </button>
                    
                    <button onclick="forceResetStorage()" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 px-4 rounded-lg shadow transition cursor-pointer border-2 border-violet-300">
                        🚨 點此一鍵修復與重現資料
                    </button>
                    
                    <button onclick="manualSave()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-4 rounded-lg shadow transition cursor-pointer">
                        💾 手動即時存檔
                    </button>
                    
                    <div class="text-center sm:text-left sm:col-span-2">
                        <span id="syncStatus" class="text-xs font-semibold text-emerald-600 block">💾 系統準備就緒</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden mb-6">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-800 text-white text-sm font-semibold">
                            <th class="p-4 text-center whitespace-nowrap">股票代號/名稱 (輸入代號自動查)</th>
                            <th class="p-4 text-center whitespace-nowrap">持股股數</th>
                            <th class="p-4 text-center whitespace-nowrap">平均成本 (元)</th>
                            <th class="p-4 text-center whitespace-nowrap">當下股價 (元)</th>
                            <th class="p-4 text-center whitespace-nowrap">庫存漲跌幅</th>
                            <th class="p-4 text-center whitespace-nowrap">目前市值</th>
                            <th class="p-4 text-center whitespace-nowrap">本金占比</th>
                            <th class="p-4 text-center whitespace-nowrap">操作</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody" class="divide-y divide-gray-200 text-sm">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">🔍 歷史明細篩選控制區</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">交易標的篩選</label>
                    <select id="filterStock" onchange="applyFilters()" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="all">顯示全部標的</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">開始日期</label>
                    <input type="date" id="filterStartDate" onchange="applyFilters()" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">結束日期</label>
                    <input type="date" id="filterEndDate" onchange="applyFilters()" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden mb-6">
            <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center flex-wrap gap-2">
                <h2 class="text-xl font-bold text-gray-800">📜 歷史交易紀錄與實現損益明細</h2>
                <button onclick="clearHistory()" class="bg-gray-200 hover:bg-gray-300 text-gray-600 font-medium py-1 px-3 rounded text-sm transition cursor-pointer">🗑️ 清空歷史紀錄</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-700 text-white text-sm font-semibold">
                            <th class="p-4 text-center">交易日期</th>
                            <th class="p-4 text-center">股票標的</th>
                            <th class="p-4 text-center">交易類型</th>
                            <th class="p-4 text-center">異動股數</th>
                            <th class="p-4 text-center">交易單價</th>
                            <th class="p-4 text-center">交易總額</th>
                            <th class="p-4 text-center">該筆實現損益</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody" class="divide-y divide-gray-200 text-sm text-center">
                        </tbody>
                    <tfoot>
                        <tr id="filterSummaryRow" class="bg-blue-50 font-bold text-blue-900 border-t-2 border-blue-200">
                            <td colspan="4" class="p-4 text-left pl-6">📊 當前篩選條件下結果小計：</td>
                            <td id="summaryCount" class="p-4">共 0 筆明細</td>
                            <td id="summaryTotalAmount" class="p-4">交易總額: $0</td>
                            <td id="summaryTotalProfit" class="p-4 text-right pr-6">累積實現總損益: $0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="text-lg font-semibold text-gray-800 mb-4 text-center">📊 資產現值圓餅占比圖</h3>
                <div class="relative max-w-xs mx-auto h-64"><canvas id="pieChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="text-lg font-semibold text-gray-800 mb-4 text-center">📈 庫存個股漲跌幅直方圖 (%)</h3>
                <div class="relative max-w-full mx-auto h-64"><canvas id="barChart"></canvas></div>
            </div>
        </div>
    </div>

    <div id="transactionModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl relative">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-800 mb-4">📈 執行庫存交易異動</h3>
            <input type="hidden" id="modalStockIndex">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">交易類型</label>
                    <select id="modalType" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="買入加碼">加碼買進</option>
                        <option value="分批賣出">分批賣出</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">交易日期</label>
                    <input type="date" id="modalDate" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">異動股數 (股)</label>
                    <input type="number" id="modalShares" min="1" onclick="this.select()" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">交易單價 (元)</label>
                    <input type="number" id="modalPrice" step="0.01" min="0" onclick="this.select()" class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-lg font-medium transition cursor-pointer">取消</button>
                <button onclick="submitTransaction()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium shadow transition cursor-pointer">確認執行</button>
            </div>
        </div>
    </div>

    <script>
        let stocks = [];
        let historyLog = [];
        let pieChartInstance = null;
        let barChartInstance = null;
        const chartColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#64748b'];

        // 預設初始資料集
        const defaultStocks = [
            { name: '0056 元大高股息', shares: 3449, cost: 37.33, current: 51.8 },
            { name: '00878 國泰永續高股息', shares: 3149, cost: 22.01, current: 32.32 },
            { name: '00919 群益台灣精選高息', shares: 3726, cost: 23.17, current: 30.67 },
            { name: '00929 復華台灣科技優息', shares: 3420, cost: 18.97, current: 29.94 },
            { name: '3661 世芯-KY', shares: 20, cost: 3290, current: 4285 },
            { name: '4966 譜瑞-KY', shares: 155, cost: 805.56, current: 738.51 },
            { name: '6515 穎威', shares: 10, cost: 8647.5, current: 8425 }
        ];

        window.onload = function() {
            loadDataFromStorage();
        };

        function loadDataFromStorage() {
            try {
                const savedStocks = localStorage.getItem('accounting_stocks');
                const savedHistory = localStorage.getItem('accounting_history');
                
                if (savedStocks) stocks = JSON.parse(savedStocks);
                if (savedHistory) historyLog = JSON.parse(savedHistory);
            } catch (e) {
                console.error("讀取快取失敗", e);
            }

            if (!Array.isArray(stocks) || stocks.length === 0) stocks = [...defaultStocks];
            if (!Array.isArray(historyLog)) historyLog = [];

            sanitizeHistory();
            renderTable();
            updateSelectOptions();
            applyFilters();
        }

        function sanitizeHistory() {
            historyLog = historyLog.filter(log => log && typeof log === 'object').map(log => {
                let p = Number(log.profit);
                return {
                    date: log.date || '',
                    name: log.name || '未知標的',
                    type: log.type || '買入加碼',
                    shares: Number(log.shares) || 0,
                    price: Number(log.price) || 0,
                    total: Number(log.total) || 0,
                    profit: isNaN(p) ? 0 : p
                };
            });
        }

        // 一鍵格式健檢
        function forceResetStorage() {
            if (confirm("是否執行網頁深度健檢？系統將保留您辛苦記下的庫存與歷史帳本，只去清洗校正格式錯誤！")) {
                try {
                    const savedStocks = localStorage.getItem('accounting_stocks');
                    const savedHistory = localStorage.getItem('accounting_history');
                    if (savedStocks) stocks = JSON.parse(savedStocks);
                    if (savedHistory) historyLog = JSON.parse(savedHistory);
                } catch(e) {}

                if (!Array.isArray(stocks) || stocks.length === 0) stocks = [...defaultStocks];
                if (!Array.isArray(historyLog)) historyLog = [];

                stocks = stocks.map(s => ({
                    name: s.name || '',
                    shares: isNaN(Number(s.shares)) ? 0 : Number(s.shares),
                    cost: isNaN(Number(s.cost)) ? 0 : Number(s.cost),
                    current: isNaN(Number(s.current)) ? 0 : Number(s.current)
                }));
                sanitizeHistory();

                autoSave();
                renderTable();
                updateSelectOptions();
                applyFilters();
                showStatus("✅ 網頁格式校正完成！您原本紀錄的股票已成功保留與重現！");
            }
        }

        // 🌟 核心：輸入代號自動查台股名稱與即時股價
        async function checkTaiwanStock(index, inputElement) {
            const query = inputElement.value.trim();
            if (!query) return;

            // 擷取前幾位數字作為代號 (例如輸入 "2330 台積電" 提取出 "2330")
            const codeMatch = query.match(/^\d+/);
            if (!codeMatch) return; // 如果不是數字開頭，當作使用者自訂名稱，不觸發自動查詢
            
            const code = codeMatch[0];
            showStatus(`⏳ 正在聯網查詢台股代號 ${code} 的最新即時資訊...`);

            try {
                // 利用 cors-anywhere 或公用開放的證交所盤後 API 進行查詢 (使用符合各大瀏覽器無阻擋的 JSONP/Fetch 來源)
                // 這裡採用臺灣證券交易所官方開放資料 API 機制或公開鏡像
                const response = await fetch(`https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL`);
                if (!response.ok) throw new Error("API連線失敗");
                
                const data = await response.json();
                
                // 比對代號
                const matchedStock = data.find(item => item.Code === code);
                
                if (matchedStock) {
                    const realName = `${matchedStock.Code} ${matchedStock.Name}`;
                    const realPrice = parseFloat(matchedStock.ClosingPrice) || 0;
                    
                    stocks[index].name = realName;
                    if (realPrice > 0) {
                        stocks[index].current = realPrice;
                    }
                    
                    showStatus(`✅ 成功自動帶出：${realName}！最新股價: ${realPrice}`);
                    renderTable();
                    updateSelectOptions();
                    autoSave();
                } else {
                    // 如果在上市找不到，嘗試尋找上櫃 (大盤代號通配擴充提示)
                    showStatus(`⚠️ 證交所資料庫中未找到代號 ${code}，已為您保留手動輸入格式。`);
                }
            } catch (error) {
                console.error("聯網抓取股價失敗:", error);
                showStatus(`❌ 聯網超時或證交所伺服器忙碌。別擔心，您仍可自由手動填寫股名與股價！`);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('stockTableBody');
            if(!tbody) return;
            tbody.innerHTML = '';
            
            let totalCapital = 0;
            let totalCurrentValue = 0;
            let chartLabels = [];
            let marketValues = [];
            let returnPercents = [];

            stocks.forEach((stock, index) => {
                const shares = Number(stock.shares) || 0;
                const cost = Number(stock.cost) || 0;
                const current = Number(stock.current) || 0;

                const stockCostRow = shares * cost;
                const stockMarketValue = shares * current;
                
                totalCapital += stockCostRow;
                totalCurrentValue += stockMarketValue;

                const changePercent = cost > 0 ? ((current - cost) / cost * 100).toFixed(2) : "0.00";
                const isPositive = parseFloat(changePercent) >= 0;

                chartLabels.push(stock.name || '未命名');
                marketValues.push(Math.round(stockMarketValue));
                returnPercents.push(parseFloat(changePercent));

                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition text-center';
                
                row.innerHTML = `
                    <td class="p-4 font-medium text-blue-600 text-left">
                        <input type="text" placeholder="輸入代號(如2330)按Enter或點旁邊" value="${stock.name || ''}" onblur="checkTaiwanStock(${index}, this)" onkeydown="if(event.key==='Enter') checkTaiwanStock(${index}, this)" onchange="updateStockField(${index}, 'name', this.value)" class="w-full text-left bg-transparent focus:bg-white border-b border-transparent focus:border-gray-300 px-1 py-0.5 rounded focus:outline-none">
                    </td>
                    <td class="p-4">
                        <input type="number" value="${shares}" onclick="this.select()" onchange="updateStockField(${index}, 'shares', this.value)" class="w-20 text-center bg-transparent focus:bg-white border border-transparent focus:border-gray-300 rounded focus:outline-none">
                    </td>
                    <td class="p-4">
                        <input type="number" step="0.01" value="${cost}" onclick="this.select()" onchange="updateStockField(${index}, 'cost', this.value)" class="w-24 text-center bg-transparent focus:bg-white border border-transparent focus:border-gray-300 rounded focus:outline-none">
                    </td>
                    <td class="p-4">
                        <input type="number" step="0.01" value="${current}" onclick="this.select()" onchange="updateStockField(${index}, 'current', this.value)" class="w-24 text-center bg-transparent focus:bg-white border border-transparent focus:border-gray-300 rounded focus:outline-none">
                    </td>
                    <td class="p-4 font-semibold ${isPositive ? 'text-red-600' : 'text-emerald-600'}">${isPositive ? '+' : ''}${changePercent}%</td>
                    <td class="p-4 font-medium text-gray-700">$${Math.round(stockMarketValue).toLocaleString()}</td>
                    <td class="p-4 font-medium text-gray-500" id="weight-${index}">0.00%</td>
                    <td class="p-4 space-x-2 whitespace-nowrap">
                        <button onclick="openTransactionModal(${index})" class="bg-blue-50 hover:bg-blue-100 text-blue-600 font-semibold py-1 px-3 border border-blue-200 rounded transition text-xs cursor-pointer">🔄 交易</button>
                        <button onclick="deleteStockRow(${index})" class="bg-red-50 hover:bg-red-100 text-red-500 font-semibold py-1 px-2 border border-red-100 rounded transition text-xs cursor-pointer">🗑️ 刪除</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalCapital').value = Math.round(totalCapital).toLocaleString();
            document.getElementById('totalCurrentValue').value = Math.round(totalCurrentValue).toLocaleString();

            const totalProfitLoss = totalCurrentValue - totalCapital;
            const amountEl = document.getElementById('totalProfitLossAmount');
            const percentEl = document.getElementById('totalProfitLossPercent');
            
            if (amountEl && percentEl) {
                amountEl.innerText = (totalProfitLoss >= 0 ? '+' : '') + Math.round(totalProfitLoss).toLocaleString();
                if (totalCapital > 0) {
                    const totalPercent = (totalProfitLoss / totalCapital * 100).toFixed(2);
                    percentEl.innerText = (totalPercent >= 0 ? '+' : '') + totalPercent + '%';
                } else {
                    percentEl.innerText = '0.00%';
                }

                if (totalProfitLoss >= 0) {
                    amountEl.className = "text-2xl font-black tracking-wide text-red-600 my-1";
                    percentEl.className = "text-sm font-bold bg-red-50 px-3 py-1 rounded-full text-red-600 mt-1 border border-red-200";
                } else {
                    amountEl.className = "text-2xl font-black tracking-wide text-emerald-600 my-1";
                    percentEl.className = "text-sm font-bold bg-emerald-50 px-3 py-1 rounded-full text-emerald-600 mt-1 border border-emerald-200";
                }
            }

            stocks.forEach((stock, index) => {
                const shares = Number(stock.shares) || 0;
                const cost = Number(stock.cost) || 0;
                const weight = totalCapital > 0 ? (((shares * cost) / totalCapital) * 100).toFixed(2) : 0;
                const weightTd = document.getElementById(`weight-${index}`);
                if (weightTd) weightTd.innerText = `${weight}%`;
            });

            updateCharts(chartLabels, marketValues, returnPercents);
        }

        function updateCharts(labels, marketValues, returnPercents) {
            if (pieChartInstance) pieChartInstance.destroy();
            if (barChartInstance) barChartInstance.destroy();

            const ctxPie = document.getElementById('pieChart')?.getContext('2d');
            if(ctxPie) {
                pieChartInstance = new Chart(ctxPie, {
                    type: 'pie',
                    data: { labels: labels, datasets: [{ data: marketValues, backgroundColor: chartColors }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } } }
                });
            }

            const ctxBar = document.getElementById('barChart')?.getContext('2d');
            if(ctxBar) {
                barChartInstance = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '漲跌幅 (%)',
                            data: returnPercents,
                            backgroundColor: returnPercents.map(v => v >= 0 ? 'rgba(239, 68, 68, 0.85)' : 'rgba(16, 185, 129, 0.85)'),
                            borderColor: returnPercents.map(v => v >= 0 ? '#ef4444' : '#10b981'),
                            borderWidth: 1
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }

        function updateStockField(index, field, value) {
            if (field === 'name') stocks[index].name = value;
            else stocks[index][field] = Number(value) || 0;
            renderTable();
            autoSave();
        }

        function addStockRow() {
            stocks.push({ name: '', shares: 0, cost: 0, current: 0 });
            renderTable();
            autoSave();
        }

        function deleteStockRow(index) {
            const displayName = stocks[index].name || '未命名標的';
            if(confirm(`確認要移除 ${displayName} 嗎？`)) {
                stocks.splice(index, 1);
                renderTable();
                updateSelectOptions();
                applyFilters();
                autoSave();
            }
        }

        function openTransactionModal(index) {
            const displayName = stocks[index].name || '未命名標的';
            document.getElementById('modalStockIndex').value = index;
            document.getElementById('modalTitle').innerText = `📊 交易異動 - ${displayName}`;
            document.getElementById('modalDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalShares').value = '';
            document.getElementById('modalPrice').value = stocks[index].current || '';
            document.getElementById('transactionModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('transactionModal').classList.add('hidden'); }

        function submitTransaction() {
            const index = document.getElementById('modalStockIndex').value;
            const type = document.getElementById('modalType').value;
            const date = document.getElementById('modalDate').value || new Date().toLocaleDateString();
            const shares = Number(document.getElementById('modalShares').value);
            const price = Number(document.getElementById('modalPrice').value);

            if (!shares || !price) { alert('請填寫正確數據！'); return; }

            let profitLoss = 0;
            const originalCost = Number(stocks[index].cost) || 0;
            const originalShares = Number(stocks[index].shares) || 0;
            const stockName = stocks[index].name || '未命名標的';

            if (type === '買入加碼') {
                const totalCost = (originalShares * originalCost) + (shares * price);
                stocks[index].shares = originalShares + shares;
                stocks[index].cost = stocks[index].shares > 0 ? Number((totalCost / stocks[index].shares).toFixed(2)) : 0;
            } else if (type === '分批賣出') {
                if (shares > originalShares) { alert('庫存股數不足！'); return; }
                stocks[index].shares = originalShares - shares;
                profitLoss = Math.round((price - originalCost) * shares);
            }

            historyLog.unshift({ date, name: stockName, type, shares, price, total: Math.round(shares * price), profit: profitLoss });
            closeModal();
            renderTable();
            applyFilters();
            autoSave();
        }

        // 🌟 全自動一鍵同步所有現有股票最新股價
        async function fetchCurrentPrices() {
            showStatus("⏳ 正在聯網同步所有庫存標的的最新股價...");
            try {
                const response = await fetch(`https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL`);
                if (!response.ok) throw new Error("API連線失敗");
                const data = await response.json();

                stocks.forEach(s => {
                    if (s.name) {
                        const codeMatch = s.name.match(/^\d+/);
                        if (codeMatch) {
                            const matched = data.find(item => item.Code === codeMatch[0]);
                            if (matched && parseFloat(matched.ClosingPrice) > 0) {
                                s.current = parseFloat(matched.ClosingPrice);
                            }
                        }
                    }
                });

                renderTable();
                showStatus("✅ 全標的真實股價同步成功！");
                autoSave();
            } catch (e) {
                showStatus("❌ 聯網同步失敗（證交所API無回應），已為您維持原數據。");
            }
        }

        function updateSelectOptions() {
            const select = document.getElementById('filterStock');
            if(!select) return;
            const currentValue = select.value;
            select.innerHTML = '<option value="all">顯示全部標的</option>';
            stocks.forEach(s => { if(s.name) select.innerHTML += `<option value="${s.name}">${s.name}</option>`; });
            if([...select.options].some(o => o.value === currentValue)) select.value = currentValue;
        }

        function applyFilters() {
            const tbody = document.getElementById('historyTableBody');
            if(!tbody) return;
            
            const filterStock = document.getElementById('filterStock')?.value || 'all';
            const startDate = document.getElementById('filterStartDate')?.value || '';
            const endDate = document.getElementById('filterEndDate')?.value || '';

            tbody.innerHTML = '';
            let filteredCount = 0, filteredTotalAmount = 0, filteredTotalProfit = 0;

            historyLog.forEach(log => {
                if ((filterStock === 'all' || log.name === filterStock) && (!startDate || log.date >= startDate) && (!endDate || log.date <= endDate)) {
                    filteredCount++;
                    filteredTotalAmount += log.total;
                    filteredTotalProfit += log.profit;

                    let profitText = '$0 (平盤)', profitClass = 'text-gray-500';
                    if (log.type === '分批賣出') {
                        if (log.profit > 0) { profitText = `賺 $${log.profit.toLocaleString()}`; profitClass = 'text-red-600 font-semibold'; }
                        else if (log.profit < 0) { profitText = `賠 $${Math.abs(log.profit).toLocaleString()}`; profitClass = 'text-emerald-600 font-semibold'; }
                    }

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 transition';
                    row.innerHTML = `
                        <td class="p-4">${log.date}</td>
                        <td class="p-4 text-slate-700 font-medium">${log.name}</td>
                        <td class="p-4 font-bold ${log.type === '買入加碼' ? 'text-red-600' : 'text-emerald-600'}">${log.type}</td>
                        <td class="p-4">${log.shares.toLocaleString()} 股</td>
                        <td class="p-4">$${log.price.toLocaleString()}</td>
                        <td class="p-4 font-medium text-gray-800">$${log.total.toLocaleString()}</td>
                        <td class="p-4 ${profitClass}">${profitText}</td>
                    `;
                    tbody.appendChild(row);
                }
            });

            document.getElementById('summaryCount').innerText = `共 ${filteredCount} 筆明細`;
            document.getElementById('summaryTotalAmount').innerText = `交易總額: $${filteredTotalAmount.toLocaleString()}`;
            
            const profitTd = document.getElementById('summaryTotalProfit');
            if(profitTd) {
                profitTd.innerText = `累積實現總損益: ${filteredTotalProfit >= 0 ? '+' : ''}$${filteredTotalProfit.toLocaleString()}`;
                if(filteredTotalProfit > 0) profitTd.className = "p-4 text-right pr-6 text-red-600 font-black text-base";
                else if(filteredTotalProfit < 0) profitTd.className = "p-4 text-right pr-6 text-emerald-600 font-black text-base";
                else profitTd.className = "p-4 text-right pr-6 text-slate-700 font-bold";
            }
        }

        function clearHistory() { if(confirm('確定清空？')) { historyLog = []; applyFilters(); autoSave(); } }

        function autoSave() {
            localStorage.setItem('accounting_stocks', JSON.stringify(stocks));
            localStorage.setItem('accounting_history', JSON.stringify(historyLog));
        }
        function manualSave() { autoSave(); showStatus("💾 資料已成功同步存檔！"); }
        function showStatus(msg) { const el = document.getElementById('syncStatus'); if(el) el.innerText = msg; }
    </script>
</body>
</html>
